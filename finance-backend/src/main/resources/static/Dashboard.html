<!DOCTYPE html>
<html>

<head>

    <title>Finance Dashboard</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="./style.css">

</head>

<body>

<div class="container">

    <h2 class="mt-4">💰 Finance Dashboard</h2>
    <p class="text-muted">Track your income and expenses</p>
    <button class="btn btn-danger float-end" onclick="logout()">Logout</button>

    <hr>

    <h4>Dashboard Summary</h4>


        <div class="row g-3">

            <div class="col-md-4">
                <div class="card p-3 bg-success text-white">
                    <h5>Total Income</h5>
                    <h3 id="income">0</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 bg-danger text-white">
                    <h5>Total Expense</h5>
                    <h3 id="expense">0</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 bg-dark text-white">
                    <h5>Net Balance</h5>
                    <h3 id="balance">0</h3>
                </div>
            </div>


    </div>

    <hr>

    <h4>Add Record</h4>

    <input id="amount" class="form-control mb-2" placeholder="Amount">

    <select id="type" class="form-control mb-2">
        <option>INCOME</option>
        <option>EXPENSE</option>
    </select>

    <input id="category" class="form-control mb-2" placeholder="Category">

    <input id="date" type="date" class="form-control mb-2">

    <input id="notes" class="form-control mb-2" placeholder="Notes">

    <button class="btn btn-success" onclick="createRecord()">Add Record</button>

    <hr>

    <h4>Records</h4>

    <table class="table">

        <thead>

        <tr>
            <th>Amount</th>
            <th>Type</th>
            <th>Category</th>
            <th>Date</th>
            <th>Notes</th>
        </tr>

        </thead>

        <tbody id="recordsTable">

        </tbody>

    </table>

</div>

<script src="script.js"></script>

</body>
</html>
